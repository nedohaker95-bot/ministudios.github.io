<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Market - Скачать Skype</title>
    <style>
        body {
            background-color: #eeeeee;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background: linear-gradient(to bottom, #98c01d 0%, #82a513 100%);
            color: white;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            border-bottom: 2px solid #6d8a10;
        }

        .logo-text { font-size: 20px; font-weight: bold; }

        nav { background: #323232; display: flex; }
        nav div {
            flex: 1; text-align: center; padding: 12px 0;
            color: #bbbbbb; font-size: 13px; font-weight: bold; text-transform: uppercase;
        }
        nav div.active { color: white; background: #404040; border-bottom: 3px solid #98c01d; }

        .app-list { padding: 8px; }

        /* Стиль карточки-ссылки на скачивание */
        .app-item {
            background: white;
            border: 1px solid #d0d0d0;
            margin-bottom: 4px;
            display: flex;
            padding: 12px;
            align-items: center;
            text-decoration: none;
            color: inherit;
        }

        .app-item:hover { background-color: #f9f9f9; border-color: #98c01d; }

        .app-icon {
            width: 52px;
            height: 52px;
            background: #00aff0; /* Цвет Skype */
            margin-right: 12px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 24px;
        }

        .app-details { flex-grow: 1; }
        .app-name { font-weight: bold; font-size: 16px; color: #222; }
        .app-sub { color: #777; font-size: 12px; }

        .download-btn {
            background: #e8e8e8;
            border: 1px solid #cccccc;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: bold;
            color: #444;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-text">Android Market</div>
</header>

<nav>
    <div class="active">Приложения</div>
    <div>Загрузки</div>
</nav>

<div class="app-list">

    <a href="SkypeSetup.exe" class="app-item" download>
        <div class="app-icon">S</div>
        <div class="app-details">
            <div class="app-name">Skype (Original)</div>
            <div class="app-sub">Microsoft Corporation</div>
        </div>
        <div class="download-btn">Скачать</div>
    </a>

</div>

</body>
</html>
