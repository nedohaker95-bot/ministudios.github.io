<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Market 2012</title>
    <style>
        /* Стиль в духе 2012 года */
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Верхняя зеленая панель */
        header {
            background: linear-gradient(to bottom, #a4c639, #8db021);
            color: white;
            padding: 10px;
            display: flex;
            align-items: center;
            border-bottom: 2px solid #7a9a1a;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        .market-logo {
            font-weight: bold;
            font-size: 20px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        /* Тёмная панель вкладок */
        nav {
            background: #333;
            display: flex;
            border-bottom: 1px solid #000;
            flex-shrink: 0;
        }

        nav div {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            color: #bbbbbb;
            font-size: 14px;
            text-transform: uppercase;
            border-right: 1px solid #444;
            cursor: pointer;
        }

        nav div.active {
            color: white;
            background: #444;
            border-bottom: 3px solid #a4c639;
        }

        /* Центральная часть с рекламой */
        .market-content {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Рекламный баннер (Генерация картинки) */
        .ad-banner {
            width: 100%;
            max-width: 600px;
            height: 250px;
            border: 1px solid #c0c0c0;
            border-radius: 3px;
            background-color: #e0e0e0;
            background-image: 
                linear-gradient(to right, #e0e0e0 10%, transparent 10%, transparent 50%, #e0e0e0 50%, #e0e0e0 60%, transparent 60%, transparent 100%),
                linear-gradient(to bottom, #e0e0e0 10%, transparent 10%, transparent 50%, #e0e0e0 50%, #e0e0e0 60%, transparent 60%, transparent 100%),
                linear-gradient(45deg, #e0e0e0 25%, #d8d8d8 25%, #d8d8d8 50%, #e0e0e0 50%, #e0e0e0 75%, #d8d8d8 75%, #d8d8d8 100%);
            background-size: 80px 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #444;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 1px 1px 1px white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .ad-banner span {
            background-color: rgba(224, 224, 224, 0.9);
            padding: 10px 20px;
            border-radius: 4px;
        }

    </style>
</head>
<body>

<header>
    <div class="market-logo">Android Market</div>
</header>

<nav>
    <div class="active">Приложения</div>
    <div>Игры</div>
    <div>Мои файлы</div>
</nav>

<div class="market-content">
    <div class="ad-banner">
        <span>Здесь может быть ваша реклама!</span>
    </div>
</div>

</body>
</html>
