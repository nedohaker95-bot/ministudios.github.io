<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Market</title>
    <style>
        /* Ретро-стиль Android Market 2.3.6 */
        body {
            background-color: #eeeeee;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Верхняя плашка */
        header {
            background: linear-gradient(to bottom, #98c01d 0%, #82a513 100%);
            color: white;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            border-bottom: 2px solid #6d8a10;
        }

        .logo-text {
            font-size: 20px;
            font-weight: bold;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.3);
        }

        /* Навигация */
        nav {
            background: #323232;
            display: flex;
        }

        nav div {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            color: #bbbbbb;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-right: 1px solid #444;
        }

        nav div.active {
            color: white;
            background: #404040;
            border-bottom: 3px solid #98c01d;
        }

        /* Контент */
        .app-list {
            padding: 10px;
        }

        .app-item {
            background: white;
            border: 1px solid #d0d0d0;
            margin-bottom: 4px;
            display: flex;
            padding: 8px;
            align-items: center;
        }

        .app-icon {
            width: 52px;
            height: 52px;
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            margin-right: 12px;
            border-radius: 4px;
        }

        .app-details {
            flex-grow: 1;
        }

        .app-name {
            font-weight: bold;
            font-size: 16px;
            color: #222;
            margin-bottom: 2px;
        }

        .app-sub {
            color: #777;
            font-size: 13px;
        }

        .price-tag {
            background: #e8e8e8;
            border: 1px solid #cccccc;
            padding: 4px 8px;
            font-size: 14px;
            font-weight: bold;
            color: #444;
            border-radius: 2px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-text">Android Market</div>
</header>

<nav>
    <div class="active">Приложения</div>
    <div>Игры</div>
</nav>

<div class="app-list">
    <div class="app-item">
        <div class="app-icon" style="background: #ffa500; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;">PL</div>
        <div class="app-details">
            <div class="app-name">PL Messenger</div>
            <div class="app-sub">Ministudios</div>
        </div>
        <div class="price-tag">Бесплатно</div>
    </div>

    <div class="app-item" style="opacity: 0.7;">
        <div class="app-icon"></div>
        <div class="app-details">
            <div class="app-name">Новый проект</div>
            <div class="app-sub">Скоро в Маркете...</div>
        </div>
        <div class="price-tag">---</div>
    </div>
</div>

</body>
</html>
